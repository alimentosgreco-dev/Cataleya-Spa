services:
  postgres:
    image: postgres:16-alpine
    container_name: cataleya-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cataleya
      POSTGRES_PASSWORD: cataleya_dev
      POSTGRES_DB: cataleya_spa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cataleya -d cataleya_spa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
